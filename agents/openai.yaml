interface:
  display_name: "去 AI 腔"
  short_description: "把中文或英文文章、论文、文档、邮件和汇报改得更自然具体，减少模板味、机器抛光感和 ChatGPT 腔"
  default_prompt: "Use $de-ai-writing to rewrite this Chinese or English draft so it sounds natural, specific, authorial, and genre-appropriate while preserving meaning, facts, logic, citations, and evidence boundaries. Choose the Chinese or English language lane, remove stock transitions and machine-smoothed phrasing, keep concrete subjects and verbs, preserve the writer's register or English variety, and avoid inventing examples, data, citations, emotion, or personal voice. Do not chase AI detector scores or add mistakes as camouflage."
